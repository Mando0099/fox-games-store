<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fox Games Admin</title>
  <link rel="stylesheet" href="/css/admin.css" />

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-storage-compat.js"></script>
  <script src="/firebase-config.js"></script>
</head>

<body>
  <aside class="sidebar">
    <h2>Fox Store</h2>
    <button onclick="showPage('dashboard')">الرئيسية</button>
    <button onclick="showPage('products')">المنتجات</button>
    <button onclick="showPage('categories')">التصنيفات</button>
    <button onclick="showPage('codes')">أكواد المنتجات</button>
    <button onclick="showPage('orders')">الطلبات</button>
    <button onclick="showPage('coupons')">كوبونات الخصم</button>
    <button onclick="showPage('customers')">العملاء</button>
    <button onclick="logout()">تسجيل خروج</button>
  </aside>

  <main class="main">
    <section id="dashboard" class="page active">
      <h1>لوحة التحكم</h1>
      <div class="stats">
        <div><span>المنتجات</span><b id="productsCount">0</b></div>
        <div><span>الطلبات</span><b id="ordersCount">0</b></div>
        <div><span>المبيعات</span><b id="salesTotal">0 EGP</b></div>
        <div><span>الأكواد المتاحة</span><b id="codesCount">0</b></div>
      </div>
    </section>

    <section id="products" class="page">
      <h1>إدارة المنتجات</h1>

      <div class="panel">
        <input id="productId" type="hidden" />

        <input id="name" placeholder="اسم المنتج" />
        <input id="category" placeholder="التصنيف مثل PUBG / Fortnite" />
        <input id="game" placeholder="اسم اللعبة" />
        <input id="amount" type="number" placeholder="الكمية / UC / Diamonds" />
        <input id="price" type="number" placeholder="السعر" />

        <input id="image" placeholder="رابط الصورة المباشر" />
        <textarea id="description" placeholder="وصف المنتج"></textarea>

        <label class="check">
          <input id="active" type="checkbox" checked />
          المنتج مفعل
        </label>

        <button onclick="saveProduct()">حفظ المنتج</button>
        <button onclick="clearProductForm()" class="ghost">تفريغ</button>
      </div>

      <div id="productsList" class="cards"></div>
    </section>

    <section id="categories" class="page">
      <h1>التصنيفات</h1>

      <div class="panel">
        <input id="catName" placeholder="اسم التصنيف" />
        <input id="catImage" placeholder="رابط صورة التصنيف" />
        <button onclick="saveCategory()">حفظ التصنيف</button>
      </div>

      <div id="categoriesList" class="cards"></div>
    </section>

    <section id="codes" class="page">
      <h1>أكواد المنتجات</h1>

      <div class="panel">
        <select id="codeProductId"></select>

        <textarea id="codesInput" rows="8" placeholder="كل كود في سطر لوحده"></textarea>

        <button onclick="saveCodes()">حفظ الأكواد</button>
      </div>

      <div id="codesList" class="cards"></div>
    </section>

    <section id="orders" class="page">
      <h1>الطلبات</h1>
      <div id="ordersList" class="table"></div>
    </section>

    <section id="coupons" class="page">
      <h1>كوبونات الخصم</h1>

      <div class="panel">
        <input id="couponCode" placeholder="كود الخصم مثل FOX10" />
        <input id="couponValue" type="number" placeholder="نسبة الخصم" />
        <button onclick="saveCoupon()">حفظ الكوبون</button>
      </div>

      <div id="couponsList" class="cards"></div>
    </section>

    <section id="customers" class="page">
      <h1>العملاء</h1>
      <div id="customersList" class="table"></div>
    </section>
  </main>

  <script src="/js/admin.js"></script>
</body>
</html>
