<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fox Games | نتيجة الدفع</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    :root{
      --bg:#050b14;
      --card:#0d1722;
      --line:rgba(255,255,255,.10);
      --muted:#94a3b8;
      --green:#65cc00;
      --red:#ef4444;
    }

    body{
      margin:0;
      min-height:100vh;
      background:
        radial-gradient(circle at top, rgba(101,204,0,.10), transparent 34%),
        linear-gradient(180deg,#050b14,#03070d);
      color:#fff;
      font-family:Inter,Arial,sans-serif;
    }

    .payment-result-page{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:32px 16px;
    }

    .payment-card{
      width:100%;
      max-width:620px;
      background:rgba(13,23,34,.92);
      border:1px solid var(--line);
      border-radius:24px;
      padding:34px;
      text-align:center;
      box-shadow:0 24px 70px rgba(0,0,0,.45);
      backdrop-filter:blur(18px);
    }

    .logo{
      width:64px;
      height:64px;
      object-fit:contain;
      margin-bottom:18px;
    }

    .status-icon{
      width:86px;
      height:86px;
      border-radius:50%;
      display:grid;
      place-items:center;
      margin:0 auto 18px;
      font-size:42px;
      border:1px solid var(--line);
    }

    .success-icon{
      color:var(--green);
      background:rgba(101,204,0,.10);
      box-shadow:0 0 35px rgba(101,204,0,.18);
    }

    .failed-icon{
      color:var(--red);
      background:rgba(239,68,68,.10);
      box-shadow:0 0 35px rgba(239,68,68,.15);
    }

    h1{
      margin:0 0 12px;
      font-size:32px;
      letter-spacing:-.8px;
    }

    p{
      color:#cbd5e1;
      line-height:1.8;
      margin:8px 0;
      font-size:16px;
    }

    .muted{
      color:var(--muted);
      font-size:14px;
    }

    .payment-id{
      margin:22px auto 0;
      padding:13px 16px;
      border-radius:14px;
      background:rgba(255,255,255,.04);
      border:1px solid var(--line);
      color:#e2e8f0;
      max-width:420px;
      word-break:break-all;
      font-size:14px;
    }

    .actions{
      margin-top:28px;
      display:flex;
      justify-content:center;
      gap:12px;
      flex-wrap:wrap;
    }

    .btn{
      min-width:150px;
      display:inline-flex;
      justify-content:center;
      align-items:center;
      padding:13px 20px;
      border-radius:12px;
      text-decoration:none;
      font-weight:800;
      transition:.2s ease;
    }

    .btn-primary{
      background:var(--green);
      color:#071006;
    }

    .btn-secondary{
      background:rgba(255,255,255,.05);
      color:#fff;
      border:1px solid var(--line);
    }

    .btn:hover{
      transform:translateY(-2px);
    }

    .success-title{color:var(--green)}
    .failed-title{color:var(--red)}

    @media(max-width:520px){
      .payment-card{padding:26px 18px}
      h1{font-size:26px}
      .actions{flex-direction:column}
      .btn{width:100%}
    }
  </style>
</head>

<body>
  <main class="payment-result-page">
    <section class="payment-card">
      <img class="logo" src="/assets/FOX-LOGO.png" alt="Fox Games">

      <div id="successView" style="display:none;">
        <div class="status-icon success-icon">✓</div>
        <h1 class="success-title">تم الدفع بنجاح</h1>
        <p>تم استلام طلبك بنجاح وجاري معالجته.</p>
        <p class="muted">شكراً لاختيارك Fox Games.</p>
        <div id="successPaymentId" class="payment-id" style="display:none;"></div>

        <div class="actions">
          <a class="btn btn-primary" href="/">العودة للمتجر</a>
          <a class="btn btn-secondary" href="https://wa.me/201010502795" target="_blank">تواصل مع الدعم</a>
        </div>
      </div>

      <div id="failedView" style="display:none;">
        <div class="status-icon failed-icon">×</div>
        <h1 class="failed-title">تعذر إتمام عملية الدفع</h1>
        <p>لم تكتمل عملية الدفع بنجاح.</p>
        <p class="muted">يرجى إعادة المحاولة أو استخدام وسيلة دفع أخرى. إذا استمرت المشكلة، تواصل مع فريق الدعم.</p>
        <div id="failedPaymentId" class="payment-id" style="display:none;"></div>

        <div class="actions">
          <a class="btn btn-primary" href="/">العودة للمتجر</a>
          <a class="btn btn-secondary" href="https://wa.me/201010502795" target="_blank">تواصل مع الدعم</a>
        </div>
      </div>
    </section>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const status = (params.get('status') || '').toLowerCase();
    const paymentId = params.get('paymentId') || params.get('invoiceId') || params.get('Id') || '';

    const successView = document.getElementById('successView');
    const failedView = document.getElementById('failedView');

    if (status === 'success' || status === 'paid') {
      successView.style.display = 'block';

      if (paymentId) {
        const box = document.getElementById('successPaymentId');
        box.style.display = 'block';
        box.textContent = 'رقم العملية: ' + paymentId;
      }
    } else {
      failedView.style.display = 'block';

      if (paymentId) {
        const box = document.getElementById('failedPaymentId');
        box.style.display = 'block';
        box.textContent = 'رقم العملية: ' + paymentId;
      }
    }
  </script>
</body>
</html>
