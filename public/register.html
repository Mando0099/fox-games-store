<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Create Account | Fox Games</title>
  <link rel="stylesheet" href="/css/style.css"/>
  <link rel="stylesheet" href="/css/auth-ui.css"/>
</head>
<body class="authPage">
  <div class="authLayout">
    <div class="authVisual">
      <a class="authLogo" href="/"><img src="/assets/logo-wolf.svg" alt="Fox Games"><span>Fox Games</span></a>
      <h1>Create your account</h1>
      <p>Register once and your details will appear in the store profile and checkout.</p>
      <div class="authBadges"><span>Email Verify</span><span>Optional Phone</span><span>Saved Profile</span></div>
    </div>

    <div class="authCard">
      <h2>Create Account</h2>
      <p class="authSub">Email will get a verification link. Phone is optional.</p>

      <input id="fullName" placeholder="Full Name"/>
      <input id="email" placeholder="Email"/>
      <input id="password" type="password" placeholder="Password"/>
      <input id="confirmPassword" type="password" placeholder="Confirm Password"/>

      <div class="phoneRow">
        <select id="countryCode">
          <option value="">Country</option>
          <option value="+20">🇪🇬 Egypt +20</option><option value="+966">🇸🇦 Saudi +966</option>
          <option value="+971">🇦🇪 UAE +971</option><option value="+965">🇰🇼 Kuwait +965</option>
          <option value="+974">🇶🇦 Qatar +974</option><option value="+1">🇺🇸 USA +1</option>
        </select>
        <input id="phone" placeholder="Phone optional"/>
      </div>

      <button class="authPrimary" onclick="createAccount()">Create Account</button>
      <button class="authGhost" onclick="location.href='/login.html'">Already have an account?</button>
      <a class="backStore" href="/">Back to Store</a>
      <div class="msg" id="msg"></div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="/firebase-config.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
