<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Create Account | Fox Games</title>
  <link rel="stylesheet" href="/css/style.css"/>
  <style>
    body{display:grid;place-items:center;min-height:100vh;padding:24px}
    .login-card{width:460px;max-width:100%;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:28px;padding:28px;box-shadow:0 24px 80px rgba(0,0,0,.45)}
    .login-card h1{font-size:34px;margin-bottom:8px}.login-card p{color:#b8abc8;margin-bottom:18px;line-height:1.6}
    .login-card input,.login-card select{width:100%;margin:8px 0;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.07);color:#fff;padding:14px;border-radius:16px;outline:none}
    .login-card select option{background:#111827;color:white}.phoneRow{display:grid;grid-template-columns:140px 1fr;gap:10px}
    .login-card button,.login-card a{width:100%;display:block;text-align:center;margin-top:10px;border:0;border-radius:999px;padding:14px;color:#fff;font-weight:900;text-decoration:none;background:linear-gradient(135deg,#ff2e8a,#7b2cff);cursor:pointer}
    .back{background:rgba(255,255,255,.08)!important}.msg{margin-top:12px;color:#ffd166;min-height:24px;line-height:1.5}
    small{display:block;color:#b8abc8;margin-top:6px;line-height:1.5}
  </style>
</head>
<body>
  <div class="login-card">
    <h1>Create Account</h1>
    <p>Create your Fox Games account. Phone and country are optional.</p>
    <input id="fullName" placeholder="Full Name"/>
    <input id="email" placeholder="Email"/>
    <input id="password" type="password" placeholder="Password"/>
    <input id="confirmPassword" type="password" placeholder="Confirm Password"/>
    <div class="phoneRow">
      <select id="countryCode">
        <option value="">Country</option>
        <option value="+20">🇪🇬 Egypt +20</option><option value="+966">🇸🇦 Saudi +966</option>
        <option value="+971">🇦🇪 UAE +971</option><option value="+965">🇰🇼 Kuwait +965</option>
        <option value="+974">🇶🇦 Qatar +974</option><option value="+973">🇧🇭 Bahrain +973</option>
        <option value="+968">🇴🇲 Oman +968</option><option value="+962">🇯🇴 Jordan +962</option>
        <option value="+212">🇲🇦 Morocco +212</option><option value="+1">🇺🇸 USA +1</option><option value="+44">🇬🇧 UK +44</option>
      </select>
      <input id="phone" placeholder="Phone optional"/>
    </div>
    <small>After creating your account, a verification email will be sent. Open it before logging in.</small>
    <button onclick="createAccount()">Create Account</button>
    <a class="back" href="/login.html">Already have an account? Login</a>
    <a class="back" href="/">Back to Store</a>
    <div class="msg" id="msg"></div>
  </div>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="/firebase-config.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
