<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fox Games Market</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <link rel="stylesheet" href="/css/style.css"/>
  <style>
    /* ================= START USER PROFILE STYLE ================= */
    .user-profile-wrapper { position: relative; display: inline-block; }
    .user-profile-btn { background: #0d1722; border: 1px solid rgba(101, 204, 0, 0.4); color: #fff; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-weight: 600; display: flex; align-items: center; gap: 8px; transition: 0.2s; }
    .user-profile-btn:hover { background: rgba(101, 204, 0, 0.1); box-shadow: 0 0 10px rgba(101, 204, 0, 0.2); }
    .user-profile-dropdown { position: absolute; top: 50px; right: 0; width: 300px; background: #0d1722; border: 1px solid rgba(101, 204, 0, 0.25); border-radius: 12px; box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6); padding: 16px; z-index: 1000; color: #fff; text-align: left; opacity: 0; pointer-events: none; transform: translateY(-10px); transition: all 0.3s ease; }
    .user-profile-dropdown.active { opacity: 1; pointer-events: auto; transform: translateY(0); }
    .profile-header { display: flex; align-items: center; gap: 12px; padding-bottom: 12px; border-bottom: 1px solid rgba(255, 255, 255, 0.08); }
    .profile-avatar { width: 44px; height: 44px; border-radius: 50%; border: 2px solid #65cc00; object-fit: cover; }
    .profile-info { display: flex; flex-direction: column; gap: 2px; }
    .profile-name { font-size: 15px; font-weight: 700; }
    .profile-email { font-size: 12px; color: #94a3b8; word-break: break-all; }
    .auth-method-badge { display: flex; align-items: center; gap: 6px; margin-top: 6px; background: rgba(255, 255, 255, 0.04); padding: 4px 10px; border-radius: 20px; font-size: 11px; color: #94a3b8; width: fit-content; }
    .auth-google { color: #ea4335; font-weight: bold; }
    .auth-facebook { color: #1877f2; font-weight: bold; }
    .auth-email { color: #65cc00; font-weight: bold; }
    .profile-menu-links { margin: 12px 0; display: flex; flex-direction: column; gap: 2px; }
    .profile-link { display: flex; align-items: center; gap: 10px; padding: 8px 10px; color: #cbd5e1; text-decoration: none; font-size: 13px; font-weight: 500; border-radius: 6px; transition: 0.2s; }
    .profile-link:hover { background: rgba(101, 204, 0, 0.08); color: #65cc00; }
    .logout-btn-new { width: 100%; height: 38px; background: transparent; border: 1px solid #ef4444; color: #ef4444; border-radius: 6px; font-size: 13px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; transition: 0.2s; }
    .logout-btn-new:hover { background: #ef4444; color: #fff; }
    .foxHidden { display: none !important; }
    /* ================= END USER PROFILE STYLE ================= */
  </style>
</head>
<body>
  <header class="topbar">
    <a class="brand" href="/">
      <img src="/assets/FOX-LOGO.png" alt="Fox Games">
      <span>FOX <b class="green-text">GAMES</b></span>
    </a>
    <nav class="mainNav">
      <a class="nav-link active" href="#home">Home</a>
    </nav>
    <div class="navActions">
      <button onclick="toggleLanguage()" class="langBtn" id="langToggleBtn">العربية</button>
      
      <button onclick="openAuth()" class="loginBtn" id="mainLoginBtn">Login</button>
      
      <div class="user-profile-wrapper foxHidden" id="userProfileWrapper">
        <button class="user-profile-btn" id="userProfileTrigger">
          <i class="fas fa-user-circle"></i> <span id="topNavUserName">Gamer</span>
        </button>
        <div class="user-profile-dropdown" id="userProfileDropdown">
          <div class="profile-header">
            <img src="https://via.placeholder.com/150" class="profile-avatar" id="profileUserAvatar" alt="Avatar">
            <div class="profile-info">
              <span class="profile-name" id="dropdownUserName">Gamer User</span>
              <span class="profile-email" id="dropdownUserEmail">user@example.com</span>
              <div class="auth-method-badge" id="authMethodBadge"></div>
            </div>
          </div>
          <div class="profile-menu-links">
            <a href="#products" class="profile-link"><i class="fas fa-shopping-bag"></i> <span>طلباتي</span></a>
          </div>
          <button class="logout-btn-new" id="profileLogoutBtn">
            <i class="fas fa-sign-out-alt"></i> تسجيل الخروج
          </button>
        </div>
      </div>
      
      <button onclick="toggleCart()" class="cartBtn">
        <i class="fas fa-shopping-cart"></i> <b id="cartCountTop" class="cart-badge">0</b>
      </button>
    </div>
  </header>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="/firebase-config.js"></script>
  <script src="/js/store-firebase.js"></script>
  <script src="/js/store-account.js"></script>
  <script src="/js/script.js"></script>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const mainLoginBtn = document.getElementById('mainLoginBtn');
      const userProfileWrapper = document.getElementById('userProfileWrapper');

      firebase.auth().onAuthStateChanged((user) => {
        if (user) {
          // مستخدم مسجل: أخفي زر Login تماماً وأظهر البروفايل
          if (mainLoginBtn) mainLoginBtn.classList.add('foxHidden');
          if (userProfileWrapper) userProfileWrapper.classList.remove('foxHidden');
          
          // تحديث بيانات البروفايل
          document.getElementById('topNavUserName').innerText = (user.displayName || "Gamer").split(' ')[0];
          document.getElementById('dropdownUserName').innerText = user.displayName || "Gamer";
          document.getElementById('dropdownUserEmail').innerText = user.email || "";
        } else {
          // غير مسجل: أظهر زر Login وأخفي البروفايل
          if (mainLoginBtn) mainLoginBtn.classList.remove('foxHidden');
          if (userProfileWrapper) userProfileWrapper.classList.add('foxHidden');
        }
      });
    });
  </script>
</body>
</html>
